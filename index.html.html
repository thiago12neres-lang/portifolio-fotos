<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #1f1f1f 0%, #0d0d0d 100%); color: #ffffff; padding-bottom: 50px; min-height: 100vh; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        header { text-align: center; padding: 50px 20px 40px; animation: fadeUp 0.8s ease-out forwards; }
        header h1 { font-size: 32px; font-weight: 200; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; background: linear-gradient(to right, #fff, #a3a3a3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #888888; font-size: 13px; letter-spacing: 1px; font-weight: 300; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 0 15px; max-width: 1200px; margin: 0 auto; }
        .gallery-item { overflow: hidden; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.4); aspect-ratio: 3 / 4; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.05); opacity: 0; animation: fadeUp 0.6s ease-out forwards; transition: transform 0.4s ease, box-shadow 0.4s ease; }
        
        /* Delays para as 23 mídias carregarem suavemente */
        .gallery-item:nth-child(1) { animation-delay: 0.1s; } .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; } .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; } .gallery-item:nth-child(6) { animation-delay: 0.6s; }
        .gallery-item:nth-child(7) { animation-delay: 0.7s; } .gallery-item:nth-child(8) { animation-delay: 0.8s; }
        .gallery-item:nth-child(9) { animation-delay: 0.9s; } .gallery-item:nth-child(10) { animation-delay: 1.0s; }
        .gallery-item:nth-child(n+11) { animation-delay: 1.2s; }

        .gallery-item img, .gallery-item video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease, filter 0.5s ease; pointer-events: none; }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 15px rgba(255,255,255,0.05); }
        .gallery-item:hover img, .gallery-item:hover video { transform: scale(1.08); filter: brightness(1.1); }
        
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; pointer-events: none; }
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; user-select: none; }
        #lightbox.active { display: flex; opacity: 1; }
        #lightbox-img, #lightbox-video { display: none; max-width: 90%; max-height: 80vh; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); object-fit: contain; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #lightbox-img.active-media, #lightbox-video.active-media { display: block; transform: scale(1); }
        #close-btn { position: absolute; top: 25px; right: 25px; width: 44px; height: 44px; background-color: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ffffff; font-size: 28px; cursor: pointer; z-index: 1001; border: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; background-color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.05); border-radius: 50%; color: white; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1001; }
        .prev-btn { left: 15px; } .next-btn { right: 15px; }
        @media (max-width: 768px) { .nav-btn { display: none; } #lightbox-img, #lightbox-video { max-width: 95%; } }
    </style>
</head>

    <!-- Estrutura do Lightbox -->
    <div id="lightbox" onclick="closeLightbox(event)">
        <span id="close-btn" onclick="forceClose()">&times;</span>
        <button class="nav-btn prev-btn" onclick="changeMedia(-1, event)">&#10094;</button>
        <img id="lightbox-img" src="" alt="Foto Ampliada">
        <video id="lightbox-video" src="" controls playsinline preload="metadata"></video>
        <button class="nav-btn next-btn" onclick="changeMedia(1, event)">&#10095;</button>
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVideo = document.getElementById('lightbox-video');
        const galleryItems = document.querySelectorAll('.gallery-item');
        let currentIndex = 0;

        galleryItems.forEach((item, index) => {
            item.onclick = () => openLightbox(index);
        });

        function openLightbox(index) {
            currentIndex = index;
            updateLightboxMedia();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function updateLightboxMedia() {
            const item = galleryItems[currentIndex];
            const type = item.getAttribute('data-type');
            const src = item.getAttribute('data-src');

            lightboxVideo.pause();
            lightboxImg.classList.remove('active-media');
            lightboxVideo.classList.remove('active-media');

            if (type === 'image') {
                lightboxImg.src = src;
                lightboxImg.classList.add('active-media');
            } else if (type === 'video') {
                lightboxVideo.src = src;
                lightboxVideo.classList.add('active-media');
                lightboxVideo.play(); 
            }
        }

        function changeMedia(step, event) {
            if (event) event.stopPropagation();
            currentIndex = (currentIndex + step + galleryItems.length) % galleryItems.length;
            updateLightboxMedia();
        }

        function closeLightbox(event) {
            if (event.target.id === 'lightbox') forceClose();
        }

        function forceClose() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
            lightboxVideo.pause();
        }

        let touchStartX = 0, touchEndX = 0;
        lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        lightbox.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, { passive: true });

        function handleSwipe() {
            const threshold = 50; 
            if (touchEndX < touchStartX - threshold) changeMedia(1, null); 
            if (touchEndX > touchStartX + threshold) changeMedia(-1, null);
        }
    </script>
